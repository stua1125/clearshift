spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/clearshift
    username: clearshift
    password: clearshift
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET:this-is-a-default-dev-secret-key-that-is-at-least-256-bits-long-for-hs256}
  expiration: 3600000
  refresh-expiration: 604800000

google:
  client-id: ${GOOGLE_CLIENT_ID:placeholder-client-id}

server:
  port: 8080
